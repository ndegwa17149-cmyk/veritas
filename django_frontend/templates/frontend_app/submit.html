{% extends 'frontend_app/base.html' %}

{% block title %}Veritas – Submit Contribution{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title mb-4">Submit a Contribution</h2>
          <form id="submitForm">
            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input class="form-control" id="title" required>
            </div>
            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea class="form-control" id="description"></textarea>
            </div>
            <div class="mb-3">
              <label for="type" class="form-label">Type</label>
              <select class="form-select" id="type" required>
                <option value="asset" selected>Asset</option>
                <option value="idea">Idea</option>
                <option value="work">Work</option>
              </select>
            </div>
            <div class="mb-3">
              <label for="file_url" class="form-label">File URL (HTTPS)</label>
              <input class="form-control" id="file_url" placeholder="https://example.com/file.pdf">
            </div>
            <button class="btn btn-primary w-100" type="submit">Submit</button>
          </form>
          <div id="msg" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('submitForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const token = localStorage.getItem('veritas_token');
      if (!token) {
        document.getElementById('msg').innerHTML = '<div class="alert alert-warning">Please login first.</div>';
        return;
      }
      const payload = {
        title: document.getElementById('title').value,
        description: document.getElementById('description').value,
        type: document.getElementById('type').value,
        file_url: document.getElementById('file_url').value || undefined
      };
      try {
        const res = await fetch('/api/submissions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });
        if (res.status === 201) {
          document.getElementById('msg').innerHTML = '<div class="alert alert-success">Submitted successfully (pending verification).</div>';
          return;
        }
        const err = await res.json().catch(() => ({ detail: 'Submission failed' }));
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">${err.detail || 'Submission failed'}</div>`;
      } catch (e) {
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">Network error</div>`;
      }
    });
  </script>
{% endblock %}
