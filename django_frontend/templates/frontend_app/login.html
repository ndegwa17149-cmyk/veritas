{% extends 'frontend_app/base.html' %}

{% block title %}Veritas – Login{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h2 class="card-title mb-4">Sign In</h2>
          <form id="loginForm">
            <div class="mb-3">
              <label for="identifier" class="form-label">Email or Username</label>
              <input class="form-control" id="identifier" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input class="form-control" id="password" type="password" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>
          <div id="msg" class="mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const identifier = document.getElementById('identifier').value;
      const password = document.getElementById('password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: 'Login failed' }));
          document.getElementById('msg').innerHTML = `<div class="alert alert-danger">${err.detail || 'Login failed'}</div>`;
          return;
        }
        const data = await res.json();
        localStorage.setItem('veritas_token', data.access_token);
        window.location.href = '/';
      } catch (e) {
        document.getElementById('msg').innerHTML = `<div class="alert alert-danger">Network error</div>`;
      }
    });
  </script>
{% endblock %}
