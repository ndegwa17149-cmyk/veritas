<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block meta %}{% endblock %}
    <title>{% block title %}Veritas{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      /* Brand color palette */
      :root {
        --bs-primary: #004080;      /* deep blue */
        --bs-secondary: #6c757d;    /* gray */
        --bs-success: #28a745;
        --bs-info:    #17a2b8;
        --bs-warning: #ffc107;
        --bs-danger:  #dc3545;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #f8f9fa;
        color: #212529;
      }
      .btn-primary {
        background-color: var(--bs-primary);
        border-color: var(--bs-primary);
      }
      a {
        color: var(--bs-primary);
      }
      a:hover {
        color: darken(var(--bs-primary), 10%);
      }
    </style>
    {% block extra_head %}{% endblock %}
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="/">Veritas</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="/submit/">Submit</a></li>
            <li class="nav-item"><a class="nav-link" href="/login/">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5 flex-grow-1">
      {% block content %}{% endblock %}
    </main>

    <footer class="bg-light text-center py-3 mt-auto">
      <div class="container small text-muted">
        &copy; 2026 Veritas. All rights reserved.
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
    {% block extra_js %}{% endblock %}
  </body>
</html>
