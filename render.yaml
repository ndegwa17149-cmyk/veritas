services:
  - type: web
    name: veritas-api
    runtime: python3
    buildCommand: pip install -r requirements-prod.txt || pip install -r requirements-sqlite.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: CORS_ORIGINS
        value: https://your-frontend-domain.com
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com
      - key: USE_SQLITE
        value: true  # Fallback to SQLite if PostgreSQL fails

  - type: web
    name: veritas-django
    runtime: python3
    buildCommand: |
      pip install -r requirements-prod.txt || pip install -r requirements-sqlite.txt
      cd django_frontend && \
      python manage.py collectstatic --noinput && \
      python manage.py migrate
    startCommand: |
      cd django_frontend && \
      gunicorn frontend_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com
      - key: USE_SQLITE
        value: true